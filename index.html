<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物专家动态中心</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.6; }
        .card { background: white; border-radius: 12px; padding: 20px; max-width: 600px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; font-size: 1.5rem; text-align: center; }
        .news-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .news-item:last-child { border: none; }
        .tag { background: #e8f0fe; color: #1967d2; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .time { font-size: 0.8rem; color: #999; float: right; }
    </style>
</head>
<body>
    <div class="card">
        <h1>宠物科研实时情报站</h1>
        <div class="news-item">
            <span class="tag">动态 1</span>
            <p id="news1">国际宠物健康研究取得新进展 (发布时间: 2026-04-01 00:07)</p>
        </div>
        <div class="news-item">
            <span class="tag">动态 2</span>
            <p id="news2">宠物营养行业发布年度报告</p>
        </div>
        <div class="news-item">
            <span class="tag">动态 3</span>
            <p id="news3">新型数字化诊疗工具投入临床</p>
        </div>
        <p style="text-align:center; color:#bbb; font-size:0.7rem;">自动更新系统由 GitHub Actions 驱动</p>
    </div>
</body>
</html>
